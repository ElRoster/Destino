version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tarot-postgres
    restart: always
    environment:
      POSTGRES_USER: tarot_user
      POSTGRES_PASSWORD: tarot_secure_password
      POSTGRES_DB: tarot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tarot-network

  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tarot-network

volumes:
  postgres_data:
  redis_data:

networks:
  tarot-network:
    driver: bridge
